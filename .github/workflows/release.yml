name: release

on:
  push:
    tags:
      - "v0.1*"
      - "v[1-9]*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.3)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            artifact: hake-linux.tar.gz
            staging: hake-linux
            sha: hake-linux.sha256
          - os: macos-latest
            platform: macos
            artifact: hake-macos.tar.gz
            staging: hake-macos
            sha: hake-macos.sha256
          - os: windows-latest
            platform: windows
            artifact: hake-windows.zip
            staging: hake-windows
            sha: hake-windows.sha256

    steps:
      - uses: actions/checkout@v4

      - name: Build (linux)
        if: matrix.platform == 'linux'
        run: |
          make BUNDLE_HAKO=0
          ./hake --version
          mkdir -p ${{ matrix.staging }}
          cp hake README.md LICENSE.txt ${{ matrix.staging }}/
          [ -f icon/hake.png ] && cp icon/hake.png ${{ matrix.staging }}/ || true
          tar czf ${{ matrix.artifact }} ${{ matrix.staging }}
          (cd ${{ matrix.staging }} && sha256sum hake > ../${{ matrix.sha }})

      - name: Build (macos)
        if: matrix.platform == 'macos'
        run: |
          make BUNDLE_HAKO=0
          ./hake --version
          mkdir -p ${{ matrix.staging }}
          cp hake README.md LICENSE.txt ${{ matrix.staging }}/
          [ -f icon/hake.icns ] && cp icon/hake.icns ${{ matrix.staging }}/ || true
          tar czf ${{ matrix.artifact }} ${{ matrix.staging }}
          (cd ${{ matrix.staging }} && shasum -a 256 hake > ../${{ matrix.sha }})

      - name: Set up MSYS2
        if: matrix.platform == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-binutils
            make
            zip

      - name: Build (windows)
        if: matrix.platform == 'windows'
        shell: msys2 {0}
        run: |
          export PATH=/mingw64/bin:$PATH
          make CC=gcc BUNDLE_HAKO=0
          ./hake.exe --version
          mkdir -p ${{ matrix.staging }}
          cp hake.exe README.md LICENSE.txt ${{ matrix.staging }}/
          [ -f icon/hake.ico ] && cp icon/hake.ico ${{ matrix.staging }}/ || true
          zip -r ${{ matrix.artifact }} ${{ matrix.staging }}
          (cd ${{ matrix.staging }} && sha256sum hake.exe > ../${{ matrix.sha }})

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.sha }}
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: hake (hako-edit) ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/**/hake-linux.tar.gz
            dist/**/hake-macos.tar.gz
            dist/**/hake-windows.zip
            dist/**/*.sha256
